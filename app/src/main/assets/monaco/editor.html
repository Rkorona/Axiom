<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; }
    #editor { width: 100%; height: 100%; position: absolute; top: 0; left: 0; }
  </style>
</head>
<body>
<div id="editor"></div>

<script src="vs/loader.js"></script>
<script>
  globalThis.MonacoEnvironment = {
    getWorkerUrl: function (_id, label) {
      var files = {
        json:   'vs/assets/json.worker-CvNsV1ln.js',
        css:    'vs/assets/css.worker-CgWp-mpq.js',
        html:   'vs/assets/html.worker-Dp8eKPfv.js',
        ts:     'vs/assets/ts.worker-ClNbeHrN.js',
        editor: 'vs/assets/editor.worker-DbHNojjm.js'
      };
      var path = files.editor;
      if (label === 'json') path = files.json;
      else if (label === 'css' || label === 'scss' || label === 'less') path = files.css;
      else if (label === 'html' || label === 'handlebars' || label === 'razor') path = files.html;
      else if (label === 'typescript' || label === 'javascript') path = files.ts;
      
      return window.location.origin + '/assets/monaco/' + path;
    }
  };

  require.config({ paths: { vs: 'vs' } });

  require(['vs/editor/editor.main'], function () {
    window.editor = monaco.editor.create(document.getElementById('editor'), {
      value: '',
      language: 'plaintext',
      theme: 'vs-dark',
      fontSize: 14,
      lineNumbers: 'on',
      minimap: { enabled: false },
      scrollBeyondLastLine: false,
      automaticLayout: true,
      wordWrap: 'off',
      tabSize: 4,
      insertSpaces: true,
      contextmenu: false,
      fixedOverflowWidgets: true,
      quickSuggestions: { other: true, comments: false, strings: false },
      suggestOnTriggerCharacters: true,
      acceptSuggestionOnEnter: 'on',
      tabCompletion: 'on',
      wordBasedSuggestions: 'currentDocument',
      suggest: {
        showMethods: true, showFunctions: true, showConstructors: true, showFields: true,
        showVariables: true, showClasses: true, showModules: true, showProperties: true,
        showKeywords: true, showWords: true, showSnippets: true
      },
      parameterHints: { enabled: true }
    });

    window.editor.onDidChangeModelContent(function (e) {
      var model = window.editor.getModel();
      AndroidBridge.onStatsChanged(model.getLineCount(), model.getValueLength());

      try {
        var pos = window.editor.getPosition();
        if (pos && pos.column > 1) {
          var lineContent = model.getLineContent(pos.lineNumber);
          var charBefore = lineContent[pos.column - 2];
          if (charBefore && /[\w$]/.test(charBefore)) {
            window.editor.trigger('mobile-ime', 'editor.action.triggerSuggest', {});
          }
        }
      } catch (_) {}
    });

    // ── 🧠 智能滑动防误触算法优化 ──
    var touchStartX = 0;
    var touchStartY = 0;
    var isScrollingMove = false;

    document.getElementById('editor').addEventListener('touchstart', function (e) {
      if (e.touches.length === 1) {
        touchStartX = e.touches[0].clientX;
        touchStartY = e.touches[0].clientY;
        isScrollingMove = false;
      }
    }, { passive: true });

    document.getElementById('editor').addEventListener('touchmove', function (e) {
      if (e.touches.length === 1) {
        var dx = Math.abs(e.touches[0].clientX - touchStartX);
        var dy = Math.abs(e.touches[0].clientY - touchStartY);
        // 如果手指在屏幕上移动超过 8 个像素，判定为“滚动浏览代码”，中断拉起键盘
        if (dx > 8 || dy > 8) {
          isScrollingMove = true;
        }
      }
    }, { passive: true });

    document.getElementById('editor').addEventListener('touchend', function (e) {
      // 只有当用户是“原地轻点”时，才唤醒光标和键盘输入法
      if (!isScrollingMove) {
        window.editor.focus();
        AndroidBridge.onEditorTapped();
      }
    }, { passive: true });

    setTimeout(function () {
      AndroidBridge.onReady();
    }, 0);
  });

  // ── 📂 核心指令 API ──

  function setContent(base64) {
    try {
      var content = decodeURIComponent(escape(atob(base64)));
      var model = window.editor.getModel();
      var range = model.getFullModelRange();
      window.editor.pushUndoStop();
      model.pushEditOperations([], [{ range: range, text: content }], function () { return null; });
      window.editor.pushUndoStop();
      window.editor.setPosition({ lineNumber: 1, column: 1 });
      window.editor.revealLine(1);
    } catch (e) {
      AndroidBridge.onError('setContent error: ' + e.message);
    }
  }

  function getContentBase64() {
    try { return btoa(unescape(encodeURIComponent(window.editor.getValue()))); } catch (e) { return ''; }
  }

  function setLanguage(lang) { monaco.editor.setModelLanguage(window.editor.getModel(), lang); }
  function setTheme(theme) { monaco.editor.setTheme(theme); }
  function layoutEditor() {
    if (!window.editor) return;
    var el = document.getElementById('editor');
    var w = el.clientWidth || window.innerWidth;
    var h = el.clientHeight || window.innerHeight;
    if (w > 0 && h > 0) window.editor.layout({ width: w, height: h });
  }

  // ── 📝 精准文本选择与移动引擎 ──
  var isSelectionMode = false;
  var selectionStartPos = null;

  function toggleSelectionMode() {
    if (!window.editor) return false;
    isSelectionMode = !isSelectionMode;
    if (isSelectionMode) {
      // 记住按下“选择”按钮那一刻的光标始发位置
      selectionStartPos = window.editor.getPosition();
    } else {
      selectionStartPos = null;
    }
    return isSelectionMode;
  }

  function moveCursor(dir) {
    if (!window.editor) return;
    var pos = window.editor.getPosition();
    var model = window.editor.getModel();
    var line = pos.lineNumber;
    var col = pos.column;

    if (dir === 'left') {
      if (col > 1) col--;
      else if (line > 1) { line--; col = model.getLineMaxColumn(line); }
    } else if (dir === 'right') {
      if (col < model.getLineMaxColumn(line)) col++;
      else if (line < model.getLineCount()) { line++; col = 1; }
    } else if (dir === 'up') {
      if (line > 1) line--;
    } else if (dir === 'down') {
      if (line < model.getLineCount()) line++;
    }

    var newPos = { lineNumber: line, column: col };

    if (isSelectionMode && selectionStartPos) {
      // 如果开启了选区锁定，则拖拽生成高亮选区蓝条
      window.editor.setSelection(new monaco.Selection(
        selectionStartPos.lineNumber, selectionStartPos.column,
        newPos.lineNumber, newPos.column
      ));
    } else {
      // 正常移动光标
      window.editor.setPosition(newPos);
    }
    window.editor.revealPositionInCenterIfOutsideViewport(newPos);
  }

  function selectAll() {
    if (!window.editor) return;
    window.editor.focus();
    window.editor.getAction('editor.action.selectAll').run();
  }

  function doCopy() {
    if (!window.editor) return;
    var selection = window.editor.getSelection();
    var text = window.editor.getModel().getValueInRange(selection);
    if (text) AndroidBridge.copyToSystemClipboard(text);
  }

  function doCut() {
    if (!window.editor) return;
    var selection = window.editor.getSelection();
    var text = window.editor.getModel().getValueInRange(selection);
    if (text) {
      AndroidBridge.copyToSystemClipboard(text);
      var range = new monaco.Range(selection.startLineNumber, selection.startColumn, selection.endLineNumber, selection.endColumn);
      window.editor.executeEdits('clipboard', [{ range: range, text: '', forceMoveMarkers: true }]);
    }
  }

  function insertTextBase64(base64) {
    try {
      var text = decodeURIComponent(escape(atob(base64)));
      if (!window.editor) return;
      window.editor.focus();
      var selection = window.editor.getSelection();
      var range = new monaco.Range(selection.startLineNumber, selection.startColumn, selection.endLineNumber, selection.endColumn);
      window.editor.executeEdits('clipboard', [{ range: range, text: text, forceMoveMarkers: true }]);
    } catch (e) {
      AndroidBridge.onError('insertText error: ' + e.message);
    }
  }
</script>
</body>
</html>

<!-- index.html -->
<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <!-- 移动端视口适配，禁用缩放以保证手势流畅 -->
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>CodeMirror 6</title>
    <style>
      /* Kotlin 侧可在注入内容前调用：
         document.documentElement.style.setProperty('--editor-bg', '#fafafa')
         提前设置背景色，避免主题切换时出现闪烁帧 */
      :root { --editor-bg: #282c34; }

      html,
      body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background-color: var(--editor-bg);
        /* 防止编辑器滚动到边界时事件冒泡给外层 WebView，避免整页抖动 */
        overscroll-behavior: none;
      }
      #editor {
        width: 100%;
        height: 100%;
      }
      /* 让 CodeMirror 内部区域占满容器高度，并支持自然滚动 */
      .cm-editor {
        height: 100% !important;
      }
    </style>
    <script>
      // 延迟在 DOM 准备好后再动态加载 module，避免在某些 WebView 版本中模块在 DOM 尚未解析时执行，
      // 导致 document.getElementById('editor') 返回 null 从而抛出异常，造成 editor 未初始化。
      function loadEditorModule() {
        try {
          import('./assets/index-zMJymWgQ.js').catch((err) => {
            console.error('Failed to import editor module:', err);
          });
        } catch (e) {
          console.error('Dynamic import not supported:', e);
        }
      }

      function notifyEditorReady() {
        if (window.editorAPI && typeof window.editorAPI.notifyReady === 'function') {
          window.editorAPI.notifyReady();
        } else {
          setTimeout(notifyEditorReady, 100);
        }
      }

      window.addEventListener('DOMContentLoaded', () => {
        loadEditorModule();
        notifyEditorReady();
      });
      // 兜底：若 DOMContentLoaded 已经触发，仍尝试立刻加载
      if (document.readyState === 'interactive' || document.readyState === 'complete') {
        loadEditorModule();
        notifyEditorReady();
      }
    </script>
  </head>
  <body>
    <div id="editor"></div>
  </body>
</html>

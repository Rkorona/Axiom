<!-- index.html -->
<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <!-- 移动端视口适配，禁用缩放以保证手势流畅 -->
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>CodeMirror 6</title>
    <style>
      /* Kotlin 侧可在注入内容前调用：
         document.documentElement.style.setProperty('--editor-bg', '#fafafa')
         提前设置背景色，避免主题切换时出现闪烁帧 */
      :root { --editor-bg: #282c34; }

      html,
      body {
        margin: 0;
        padding: 0;
        width: 100%;
        /* 使用 100dvh 而非 100%：Android WebView 在 Compose AndroidView 中初始
           布局高度为 0，height:100% 会沿继承链全部坍塌为 0；dvh/vh 直接取视口高度，
           不依赖父元素高度，确保 CM6 初始化时 #editor.clientHeight > 0 */
        height: 100dvh;
        overflow: hidden;
        background-color: var(--editor-bg);
        /* 防止编辑器滚动到边界时事件冒泡给外层 WebView，避免整页抖动 */
        overscroll-behavior: none;
      }
      #editor {
        /* position:fixed + inset:0 确保 #editor 始终铺满视口，彻底绕开
           height:100% 继承链在 WebView 中坍塌为 0 的问题 */
        position: fixed;
        inset: 0;
      }
      /* CM6 内部会自行给 .cm-editor 应用 height:100% 和 .cm-scroller 应用
         overflow-x:auto / height:100%，此处只补充 overflow:auto 开启双轴滚动 */
      .cm-editor {
        height: 100%;
      }
      .cm-scroller {
        overflow: auto;
      }
    </style>
    <script>
      // 将页面中的 console 与未捕获错误转发到 Kotlin 注入的 AndroidBridge.log
      // 这能把运行时错误和重要调试信息带回 Android 日志，便于定位 editor 未初始化/内容未注入的问题。
      function setupBridgeLogging() {
        if (window.__bridgeLoggingInstalled) return
        function forward(level, args) {
          try {
            const msg = args.map(a => {
              try { return typeof a === 'string' ? a : JSON.stringify(a)
              } catch (e) { return String(a) }
            }).join(' ')
            if (window.AndroidBridge && typeof window.AndroidBridge.log === 'function') {
              window.AndroidBridge.log(`[${level}] ${msg}`)
            }
          } catch (e) {
            // ignore
          }
        }

        const methods = ['log','info','warn','error','debug']
        for (const m of methods) {
          const orig = console[m]
          console[m] = function(...args) {
            try { forward(m, args) } catch (e) {}
            try { orig.apply(console, args) } catch (e) {}
          }
        }

        window.addEventListener('error', (ev) => {
          try {
            const err = ev.error || ev.message || 'unknown'
            forward('error', [err])
          } catch (e) {}
        })

        window.addEventListener('unhandledrejection', (ev) => {
          try { forward('error', [ev.reason || 'unhandledrejection']) } catch (e) {}
        })

        window.__bridgeLoggingInstalled = true
      }

      // 延迟在 DOM 准备好后再动态加载 module，避免在某些 WebView 版本中模块在 DOM 尚未解析时执行，
      // 导致 document.getElementById('editor') 返回 null 从而抛出异常，造成 editor 未初始化。
      function loadEditorModule() {
        try {
          import('./assets/index.js').catch(err => console.error('Failed:', err));
        } catch (e) {
          console.error('Dynamic import not supported:', e);
        }
      }

      function notifyEditorReady() {
        if (window.editorAPI && typeof window.editorAPI.notifyReady === 'function') {
          window.editorAPI.notifyReady();
        } else {
          setTimeout(notifyEditorReady, 100);
        }
      }

      // 等待 AndroidBridge 注入后安装日志转发；若注入较晚，轮询直到可用
      function waitForBridgeAndSetupLogging() {
        if (window.AndroidBridge && typeof window.AndroidBridge.log === 'function') {
          setupBridgeLogging()
        } else {
          setTimeout(waitForBridgeAndSetupLogging, 100)
        }
      }

      window.addEventListener('DOMContentLoaded', () => {
        waitForBridgeAndSetupLogging()
        loadEditorModule();
        notifyEditorReady();
      });
      // 兜底：若 DOMContentLoaded 已经触发，仍尝试立刻加载并安装日志转发
      if (document.readyState === 'interactive' || document.readyState === 'complete') {
        waitForBridgeAndSetupLogging()
        loadEditorModule();
        notifyEditorReady();
      }
    </script>
  </head>
  <body>
    <div id="editor"></div>
  </body>
</html>

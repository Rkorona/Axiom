<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Terminal</title>
    <link rel="stylesheet" href="./assets/index.css">
    <style>
        html, body, #terminal-container {
            width: 100%;
            height: 100%;
            margin: 0;
            padding: 0;
            background: #000;
            overflow: hidden;
        }
    </style>
</head>
<body>
    <div id="terminal-container"></div>
    <script src="./assets/index.js"></script>
    <script>
    (function () {
        function ready(fn) {
            if (document.readyState !== 'loading') { fn(); }
            else { document.addEventListener('DOMContentLoaded', fn); }
        }
        ready(function () {
            if (typeof a === 'undefined') return;

            a.onResize(function (size) {
                if (window.AndroidBridge && window.AndroidBridge.onResize) {
                    window.AndroidBridge.onResize(size.rows, size.cols);
                }
            });

            window.writeOutput = function (b64) {
                if (!window.TerminalBridge) return;
                try {
                    var s = atob(b64);
                    var bytes = new Uint8Array(s.length);
                    for (var i = 0; i < s.length; i++) bytes[i] = s.charCodeAt(i);
                    window.TerminalBridge.writeToTerminal(bytes);
                } catch (e) {}
            };

            window.setFontSize = function (size) {
                a.options.fontSize = size;
                if (window.TerminalBridge) window.TerminalBridge.resizeTerminal();
            };

            window.setTheme = function (bg, fg) {
                a.options.theme = { background: bg, foreground: fg };
            };
        });
    })();
    </script>
</body>
</html>
